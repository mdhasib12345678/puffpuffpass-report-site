<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#075E54" />
<title>Sign in · PUFF PUFF PASS Reports</title>
<link rel="stylesheet" href="/login/login.css" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMwNzVFNTQiLz48dGV4dCB4PSIzMiIgeT0iNDQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJTRiBQcm8gRGlzcGxheSwtYXBwbGUtc3lzdGVtLEhlbHZldGljYSxzYW5zLXNlcmlmIiBmb250LXNpemU9IjM4IiBmb250LXdlaWdodD0iODAwIiBmaWxsPSIjZmZmZmZmIj5QPC90ZXh0Pjwvc3ZnPg==" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"></div>
  <main class="login-shell">
    <div class="login-card" role="main" aria-labelledby="title">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">P</div>
        <div class="brand-text">
          <div class="brand-name">PUFF PUFF PASS</div>
          <div class="brand-sub">Reports portal</div>
        </div>
      </div>

      <h1 id="title">Sign in</h1>
      <p class="subtitle">Authorized access only — credentials required to view project reports.</p>

      <form action="/auth.php" method="POST" autocomplete="on" novalidate>
        <input type="hidden" name="next" id="next-field" value="/" />

        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" name="username" placeholder="Your username" required autocomplete="username" autofocus spellcheck="false" autocapitalize="off" />
        </div>

        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••••" required autocomplete="current-password" />
          <button type="button" class="reveal-btn" id="reveal" aria-label="Show password" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="error-msg" id="error-msg" role="alert" hidden>Invalid username or password.</div>

        <button type="submit" class="submit-btn">
          <span>Sign in</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </button>
      </form>

      <div class="footer-note">
        © 2026 PUFF PUFF PASS S.L. · Blasco Ibáñez, Valencia, Spain
      </div>
    </div>
  </main>

  <script src="/login/login.js" defer></script>
</body>
</html>
